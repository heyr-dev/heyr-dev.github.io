<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const supabaseUrl = "https://vefjalqeomncvvklsvua.supabase.co";
  const supabaseKey = "sb_publishable_mKFtccQH4bzZ_u7PCVY4CQ_n_RwW3-o";

  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  async function loadCottages() {

    const { data, error } = await supabase
      .from("cottages")
      .select("*");

    if (error) {
      console.error("Supabase Error:", error);
      return;
    }

    if (!data) return;

    data.forEach(function(cottage) {

      if (!cottage.name) return;

      const nameKey = cottage.name
        .toLowerCase()
        .replace(/\s+/g, "")
        .replace(/[^a-z0-9]/g, "");

      const imageEl = document.getElementById(nameKey + "-image");
      if (imageEl && cottage.image_url) {
        imageEl.src = cottage.image_url;
      }

      const descEl = document.getElementById(nameKey + "-description");
      if (descEl && cottage.description) {
        descEl.innerText = cottage.description;
      }

      const priceEl = document.getElementById(nameKey + "-price");
      if (priceEl && cottage.price) {
        priceEl.innerText = "₹ " + cottage.price;
      }

      const amenEl = document.getElementById(nameKey + "-amenities");
      if (amenEl && cottage.amenities) {
        amenEl.innerText = cottage.amenities;
      }

      const polEl = document.getElementById(nameKey + "-policies");
      if (polEl && cottage.policies) {
        polEl.innerText = cottage.policies;
      }

    });

  }

  loadCottages();

});
</script>
