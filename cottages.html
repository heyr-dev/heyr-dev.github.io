<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Cottages | Sakinn Stays</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f6f1e8;
color:#2c2a28;
}

h1,h2{
font-family:'Playfair Display',serif;
}

.hero{
height:50vh;
background:url('snow.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
color:white;
position:relative;
}
.hero::after{
content:"";
position:absolute;
top:0;left:0;right:0;bottom:0;
background:rgba(0,0,0,0.4);
}
.hero h1{
z-index:1;
font-size:46px;
}

.section{
max-width:1100px;
margin:auto;
padding:100px 20px;
}

.cottage{
background:white;
padding:50px;
margin-bottom:100px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.slider{
position:relative;
overflow:hidden;
border-radius:20px;
margin-bottom:25px;
}
.slider img{
width:100%;
display:none;
border-radius:20px;
}
.slider img.active{
display:block;
}

/* AMENITIES & POLICIES */
.details-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
margin-top:30px;
}
.details-box{
background:#f6f1e8;
padding:25px;
border-radius:15px;
}

.btn{
display:inline-block;
margin-top:30px;
padding:14px 35px;
background:#b76e79;
color:white;
text-decoration:none;
border-radius:40px;
transition:0.3s;
}
.btn:hover{
background:#9d5c66;
transform:scale(1.05);
}

.footer{
background:#2c2a28;
color:white;
padding:60px 20px;
text-align:center;
}
@media(max-width:768px){
.details-grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="hero">
<h1>Our Cottages</h1>
</div>

<div class="section">

<!-- ELUNA -->
<div class="cottage">
<h2>The Eluna</h2>

<div class="slider" id="eluna">
<img src="eluna1.jpg" class="active">
<img src="eluna2.jpg">
<img src="eluna3.jpg">
</div>

<p>A-Shape wooden cottage with panoramic Himalayan views and premium interiors.</p>

<div class="details-grid">
<div class="details-box">
<h3>Amenities</h3>
<ul>
<li>Private Balcony</li>
<li>High-Speed WiFi</li>
<li>Luxury Bedding</li>
<li>Bonfire Access</li>
</ul>
</div>
<div class="details-box">
<h3>Policies</h3>
<ul>
<li>Check-in: 1 PM</li>
<li>Check-out: 11 AM</li>
<li>No loud music after 10 PM</li>
</ul>
</div>
</div>

<a href="https://www.secure-booking-engine.com/accounts/f3EYXDMLq58U-f0jPvkL5w/properties/sm0zqE9kVSHQkXFUXOWjzQ/booking-engine/web/source/4wsctBw6Oq6j-g9XuxeRzQ/cart/jMpSnOlTghKe1HrA_Mekzg/#!/rooms" class="btn">Book Now</a>
</div>
