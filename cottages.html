<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cottages | Sakinn Stays</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Montserrat',sans-serif;
background:#f6f1e8;
color:#2c2a28;
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

.cottage{
background:white;
margin-bottom:80px;
padding:40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

h2{
font-family:'Playfair Display',serif;
}

.slider{
position:relative;
width:100%;
height:350px;
overflow:hidden;
border-radius:15px;
margin-bottom:20px;
}

.slide{
position:absolute;
width:100%;
height:100%;
opacity:0;
transition:opacity 1s;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.slide.active{
opacity:1;
}

.btn{
display:inline-block;
margin-top:20px;
padding:14px 36px;
background:#b76e79;
color:white;
text-decoration:none;
border-radius:50px;
transition:0.3s;
}

.btn:hover{
background:#9d5c66;
}

.section-title{
margin-top:30px;
font-weight:600;
}
</style>
</head>

<body>

<div class="container">

<div class="cottage">
<h2>The Eluna</h2>

<div class="slider">
<div class="slide active"><img src="eluna1.jpg"></div>
<div class="slide"><img src="eluna2.jpg"></div>
<div class="slide"><img src="eluna3.jpg"></div>
</div>

<p><b>Amenities:</b> Private Balcony · Heated Interiors · Bonfire Access · High-Speed WiFi</p>

<p><b>Policies:</b> Check-in 1PM · Check-out 11AM · No smoking indoors</p>

<p><b>How to Reach:</b> 10 mins from Mall Road, Manali</p>

Book Now
</a>
</div>

</div>

<script>
let slides = document.querySelectorAll('.slide');
let index = 0;
setInterval(()=>{
slides[index].classList.remove('active');
index = (index + 1) % slides.length;
slides[index].classList.add('active');
},3000);
</script>

</body>
</html>
