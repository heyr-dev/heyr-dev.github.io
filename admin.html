<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakinn Admin</title>
</head>
<body>

<h2>Upload Cottage Images</h2>

<select id="cottageSelect"></select>
<br><br>

<input type="file" id="imageInput" multiple>
<br><br>

<button id="uploadBtn">Upload</button>

<p id="status"></p>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

document.addEventListener("DOMContentLoaded", async function () {

  const supabase = window.supabase.createClient(
    "https://vefjalqeomncvvklsvua.supabase.co",
    "sb_publishable_mKFtccQH4bzZ_u7PCVY4CQ_n_RwW3-o"
  );

  async function loadCottages() {
    const { data, error } = await supabase
      .from("cottages")
      .select("*");

    if (error) {
      document.getElementById("status").innerText = error.message;
      return;
    }

    const select = document.getElementById("cottageSelect");
    select.innerHTML = "";

    data.forEach(c => {
      const option = document.createElement("option");
      option.value = c.id;
      option.textContent = c.name;
      select.appendChild(option);
    });
  }

  async function uploadImage() {

    const files = document.getElementById("imageInput").files;
    const cottageId = document.getElementById("cottageSelect").value;

    if (!files.length) {
      alert("Select images first");
      return;
    }

    for (let file of files) {

      const fileName = Date.now() + "-" + file.name;

      const { error } = await supabase.storage
        .from("cottage-images")
        .upload(fileName, file);

      if (error) {
        document.getElementById("status").innerText = error.message;
        return;
      }

      const publicUrl =
        "https://vefjalqeomncvvklsvua.supabase.co/storage/v1/object/public/cottage-images/" + fileName;

      await supabase.from("cottage_images").insert({
        cottage_id: cottageId,
        image_url: publicUrl
      });

    }

    document.getElementById("status").innerText = "Upload successful ✅";
  }

  document.getElementById("uploadBtn").addEventListener("click", uploadImage);

  loadCottages();

});

</script>

</body>
</html>
